<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 便签纸底色：极致纯净的雅致渐变白 -->
    <linearGradient id="paper-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F9FAFB" />
    </linearGradient>
    
    <!-- 卷角背面的立体渐变：模拟纸张翻折的阴影与高光 -->
    <linearGradient id="curl-bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D1D5DB" />
      <stop offset="40%" stop-color="#E5E7EB" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- 三个胶囊的高级纯正配色 -->
    <linearGradient id="pill-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F43F5E" />
    </linearGradient>
    <linearGradient id="pill-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="pill-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#FACC15" />
    </linearGradient>

    <!-- 整体纸张悬浮阴影 -->
    <filter id="paper-shadow" x="-20%" y="-20%" width="145%" height="145%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12" />
    </filter>

    <!-- 掀起弯折角的阴影：创造凌空飞起的感觉 -->
    <filter id="curl-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-1.5" dy="-1.5" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- 整体旋转：西北-东南走向（倾斜-26度最佳，保持完美美感） -->
  <g transform="rotate(-26, 50, 50)">
    
    {/* 1. 便签纸主体（带切角） */}
    <path 
      d="M18 30 C18 23.3726 23.3726 18 30 18 H70 C76.6274 18 82 23.3726 82 30 V64 L64 82 H30 C23.3726 82 18 76.6274 18 70 Z" 
      fill="url(#paper-bg)" 
      filter="url(#paper-shadow)"
    />

    {/* 2. 便签纸上的三行小胶囊（红、蓝、黄三色，圆点勾选框+长短胶囊条，极致物化待办） */}
    {/* 第一行：洋红胶囊 */}
    <circle cx="28" cy="32" r="3.5" fill="url(#pill-pink)" />
    <rect x="36" y="28.5" width="28" height="7" rx="3.5" fill="url(#pill-pink)" />

    {/* 第二行：极客蓝胶囊 */}
    <circle cx="28" cy="46" r="3.5" fill="url(#pill-blue)" />
    <rect x="36" y="42.5" width="36" height="7" rx="3.5" fill="url(#pill-blue)" />

    {/* 第三行：明黄胶囊 */}
    <circle cx="28" cy="60" r="3.5" fill="url(#pill-yellow)" />
    <rect x="36" y="56.5" width="20" height="7" rx="3.5" fill="url(#pill-yellow)" />

    {/* 3. 掀起一角的微弱边界阴影（渲染在卷角下方） */}
    <path d="M64 82 C64 70 70 64 82 64" stroke="#000000" stroke-opacity="0.06" stroke-width="3.5" fill="none" />

    {/* 4. 掀起弯折的角本身（立体翻折纸张背面效果） */}
    <path 
      d="M64 82 C64 73 73 64 82 64 C74 74 74 82 64 82 Z" 
      fill="url(#curl-bg)" 
      filter="url(#curl-shadow)"
    />
    <path d="M64 82 L82 64" stroke="#D1D5DB" stroke-opacity="0.4" stroke-width="0.5" />
    
  </g>
</svg>
