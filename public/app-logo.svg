<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 极简高雅的科技蓝紫渐变，缩小后也非常醒目统一 -->
    <linearGradient id="note-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <!-- 折角的高光渐变 -->
    <linearGradient id="fold-bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <!-- 投影 -->
    <filter id="logo-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4F46E5" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- 1. 便签主体（带右下角切角） -->
  <path 
    d="M15 25 C15 19.4772 19.4772 15 25 15 H75 C80.5228 15 85 19.4772 85 25 V68 L68 85 H25 C19.4772 85 15 80.5228 15 75 Z" 
    fill="url(#note-bg)" 
    filter="url(#logo-shadow)"
  />

  <!-- 2. 右下角切角折叠效果 -->
  <path d="M68 85 C68 75.6112 75.6112 68 85 68 H68 V85 Z" fill="url(#fold-bg)" />
  <path d="M68 85 L85 68" stroke="#000000" stroke-opacity="0.12" stroke-width="1" />

  <!-- 3. AI闪电对勾（大道至简，极速、AI与提醒待办的完美契合） -->
  <path 
    d="M54 26 L34 50 H52 L36 74 L70 34" 
    stroke="#FFFFFF" 
    stroke-width="8.5" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />

  <!-- 4. AI 灵感微光（Lumi Star） -->
  <path 
    d="M28 26 C28 29.5 26 31.5 22.5 31.5 C26 31.5 28 33.5 28 37 C28 33.5 30 31.5 33.5 31.5 C30 31.5 28 29.5 28 26 Z" 
    fill="#FACC15" 
  />
</svg>
